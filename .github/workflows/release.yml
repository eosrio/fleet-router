name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release and upload assets
  packages: write # push the image to GHCR

env:
  CARGO_TERM_COLOR: always

jobs:
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish (skip if this version is already on crates.io)
        run: |
          if cargo publish --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" 2>publish.err; then
            echo "Published."
          elif grep -qiE "already (uploaded|exists)|crate version .* is already" publish.err; then
            echo "This version is already on crates.io — skipping publish."
            cat publish.err
          else
            echo "Publish failed:"; cat publish.err; exit 1
          fi

  binaries:
    name: Release binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -C target/${{ matrix.target }}/release -czf fleet-router-${{ github.ref_name }}-${{ matrix.target }}.tar.gz fleet-router
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/fleet-router.exe -DestinationPath fleet-router-${{ github.ref_name }}-${{ matrix.target }}.zip
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fleet-router-*.tar.gz
            fleet-router-*.zip
          generate_release_notes: true

  docker:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eosrio/fleet-router
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

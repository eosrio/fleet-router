# cargo-deny configuration — see https://embarkstudios.github.io/cargo-deny/
# Run locally with: cargo deny check

[advisories]
version = 2
# Add RUSTSEC ids here (with a tracking note) only when a fix is unavailable.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
# Permissive licenses compatible with this crate's MIT license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]

[bans]
# Duplicate versions are common in large trees; surface but don't fail on them.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
